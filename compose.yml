services:
  backend:
    build: backend
    ports:
      - "${APP_PORT}:8000"
    
    depends_on:
      qdrant:
        condition: service_healthy
  
  qdrant:
    image: qdrant/qdrant
    restart: always
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    # configs:
    #   - source: qdrant_config
    #     target: /qdrant/config/production.yaml
    volumes:
      - ./qdrant_data:/qdrant/storage

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

configs:
  qdrant_config:
    content: |
      log_level: INFO